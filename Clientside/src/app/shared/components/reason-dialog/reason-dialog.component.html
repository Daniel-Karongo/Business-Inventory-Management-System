<div class="reason-dialog">

  <div class="reason-header">

    <h2>
      {{ data.title }}
    </h2>

    <p>
      {{ data.message }}
    </p>

  </div>

  <div class="reason-body">

    <mat-form-field appearance="outline" class="w-full">

      <mat-label>
        Reason
      </mat-label>

      <mat-select [(ngModel)]="selectedReason">

        <mat-option *ngFor="let r of reasonOptions" [value]="r">

          {{ r }}

        </mat-option>

        <mat-option *ngIf="allowCustom" value="OTHER">

          Other

        </mat-option>

      </mat-select>

    </mat-form-field>

    <mat-form-field *ngIf="selectedReason === 'OTHER'" appearance="outline" class="w-full">

      <mat-label>
        Custom Reason
      </mat-label>

      <textarea matInput rows="4" [(ngModel)]="customReason">
      </textarea>

    </mat-form-field>

  </div>

  <div *ngIf="
      data.requireReason &&
      (
        !selectedReason ||
        (
          selectedReason === 'OTHER'
          &&
          !customReason.trim()
        )
      )
    " class="reason-error">

    Reason is required

  </div>

  <div class="reason-actions">

    <button mat-stroked-button (click)="cancel()">

      {{ data.cancelText || 'Cancel' }}

    </button>

    <button mat-flat-button color="primary" (click)="confirm()" [disabled]="
        data.requireReason &&
        (
          !selectedReason ||
          (
            selectedReason === 'OTHER'
            &&
            !customReason.trim()
          )
        )
      ">

      {{ data.confirmText || 'Confirm' }}

    </button>

  </div>

</div>
