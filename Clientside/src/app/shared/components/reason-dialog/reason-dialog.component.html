<div class="reason-dialog" [ngClass]="actionClass">

  <div class="dialog-header">

    <div class="header-icon">

      <mat-icon *ngIf="data.action === 'DELETE'">
        delete_forever
      </mat-icon>

      <mat-icon *ngIf="data.action === 'DISABLE'">
        block
      </mat-icon>

      <mat-icon *ngIf="data.action === 'RESTORE'">
        restore
      </mat-icon>

      <mat-icon *ngIf="!data.action">
        help_outline
      </mat-icon>

    </div>

    <div class="header-content">

      <h2>
        {{ data.title }}
      </h2>

      <p>
        {{ data.message }}
      </p>

    </div>

  </div>

  <div class="dialog-body">

    <mat-form-field appearance="fill">

      <mat-label>
        Select Reason
      </mat-label>

      <mat-select [(ngModel)]="selectedReason">

        <mat-option *ngFor="let r of reasonOptions" [value]="r">

          {{ r }}

        </mat-option>

        <mat-option *ngIf="allowCustom" value="OTHER">

          Other

        </mat-option>

      </mat-select>

    </mat-form-field>

    <mat-form-field *ngIf="
        selectedReason === 'OTHER'
      " appearance="fill">

      <mat-label>
        Additional Notes
      </mat-label>

      <textarea matInput rows="5" maxlength="500" [(ngModel)]="customReason">
      </textarea>

    </mat-form-field>

    <div *ngIf="invalid" class="validation-banner">

      <mat-icon>
        error
      </mat-icon>

      Reason is required.

    </div>

  </div>

  <div class="dialog-footer">

    <button mat-stroked-button type="button" (click)="cancel()">

      {{
      data.cancelText ||
      'Cancel'
      }}

    </button>

    <button mat-flat-button type="button" (click)="confirm()" [disabled]="invalid">

      {{
      data.confirmText ||
      'Confirm'
      }}

    </button>

  </div>

</div>
