<div class="sidebar-root">

  <!-- BRAND -->
  <div class="sidebar-brand" [class.justify-center]="sidebar.isCollapsed$ | async">

    <ng-container *ngIf="sidebar.isCollapsed$ | async; else expandedBrand">

      <ng-container *ngIf="logo$ | async as logo; else fallbackCollapsed">
        <img [src]="logo" class="brand-logo" />
      </ng-container>

      <ng-template #fallbackCollapsed>
        <div class="brand-fallback">
          BM
        </div>
      </ng-template>

    </ng-container>

    <ng-template #expandedBrand>

      <ng-container *ngIf="logo$ | async as logo; else fallbackExpanded">
        <img [src]="logo" class="brand-logo" />
      </ng-container>

      <ng-template #fallbackExpanded>
        <div class="brand-fallback">
          BM
        </div>
      </ng-template>

      <div class="brand-meta">
        <div class="brand-title">
          Business Manager
        </div>

        <div class="brand-subtitle">
          Admin
        </div>
      </div>

    </ng-template>

  </div>

  <!-- NAVIGATION -->
  <nav class="sidebar-nav">

    <ng-container *ngFor="let item of nav">

      <!-- SIMPLE -->
      <a *ngIf="!item.children" [routerLink]="item.route" routerLinkActive="active" class="nav-item"
        [class.justify-center]="sidebar.isCollapsed$ | async"
        [matTooltip]="(sidebar.isCollapsed$ | async) ? item.title : ''" matTooltipPosition="right"
        (click)="onStandaloneNavigate()">

        <mat-icon class="nav-icon" [svgIcon]="item.icon">
        </mat-icon>

        <span class="nav-label">
          {{ item.title }}
        </span>

      </a>

      <!-- GROUP -->
      <div *ngIf="item.children" class="nav-group">

        <!-- GROUP HEADER -->
        <div class="nav-item group-header" [matTooltip]="(sidebar.isCollapsed$ | async) ? item.title : ''"
          matTooltipPosition="right" [class.justify-center]="sidebar.isCollapsed$ | async" (click)="toggleGroup(item)">

          <mat-icon class="nav-icon" [svgIcon]="item.icon">
          </mat-icon>

          <span class="nav-label">
            {{ item.title }}
          </span>

        </div>

        <!-- EXPANDED CHILDREN -->
        <div *ngIf="
            item.expanded &&
            !(sidebar.isCollapsed$ | async)
          " class="group-children">

          <a *ngFor="let child of item.children" [routerLink]="child.route" routerLinkActive="active"
            class="nav-item child-item">

            <mat-icon class="nav-icon" [svgIcon]="child.icon">
            </mat-icon>

            <span class="nav-label">
              {{ child.title }}
            </span>

          </a>

        </div>

        <!-- COLLAPSED INLINE CHILDREN -->
        <div *ngIf="item.collapsedExpanded && (sidebar.isCollapsed$ | async) " class="collapsed-children">

          <a *ngFor="let child of item.children" [routerLink]="child.route" routerLinkActive="active"
            class="collapsed-child-item" [matTooltip]="child.title" matTooltipPosition="right">

            <mat-icon class="nav-icon" [svgIcon]="child.icon">
            </mat-icon>

          </a>

        </div>

      </div>
    </ng-container>

  </nav>

  <!-- FOOTER -->
  <div class="sidebar-footer">

    <button *ngIf="!(sidebar.mobileOpen$ | async)" (click)="sidebar.toggleDesktopCollapsed()" class="collapse-btn">

      <svg xmlns="http://www.w3.org/2000/svg" class="collapse-icon" [class.rotate-180]="!(sidebar.isCollapsed$ | async)"
        fill="none" stroke="currentColor" stroke-width="1.5">

        <path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6" />

      </svg>

    </button>

  </div>

</div>
