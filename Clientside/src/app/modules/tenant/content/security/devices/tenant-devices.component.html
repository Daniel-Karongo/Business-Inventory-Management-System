<app-page-shell>

  <!-- HEADER -->
  <div page-header>
    <div class="inventory-header">

      <div class="header-left">
        <h1>Devices</h1>
      </div>

      <div class="header-right">
        <button mat-flat-button color="primary" disabled>
          <mat-icon>security</mat-icon>
          Managed Devices
        </button>
      </div>

    </div>
  </div>

  <!-- TOOLBAR -->
  <div page-toolbar class="inventory-toolbar">

    <mat-form-field appearance="fill" class="search-field">
      <mat-label>Search Devices</mat-label>
      <input matInput [(ngModel)]="searchTerm" (input)="applySearch()">
      <button matSuffix mat-icon-button *ngIf="searchTerm" (click)="searchTerm=''; applySearch()">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>

  </div>

  <!-- CONTENT -->
  <div page-content>

    <div *ngIf="loading" class="text-center py-10">
      Loading devices…
    </div>

    <div *ngIf="!loading && filtered.length === 0" class="text-center py-10">
      No devices found
    </div>

    <div *ngIf="!loading && filtered.length > 0"
         class="table-wrapper compact bg-[var(--surface)] rounded shadow">

      <table mat-table [dataSource]="paged">

        <ng-container matColumnDef="device">
          <th mat-header-cell *matHeaderCellDef>Device</th>
          <td mat-cell *matCellDef="let d">{{ d.deviceName }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let d">
            {{ d.approved ? 'Approved' : 'Pending' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="usedBy">
          <th mat-header-cell *matHeaderCellDef>Used By</th>
          <td mat-cell *matCellDef="let d">
            {{ getUsers(d) }}
          </td>
        </ng-container>

        <ng-container matColumnDef="lastSeen">
          <th mat-header-cell *matHeaderCellDef>Last Seen</th>
          <td mat-cell *matCellDef="let d">
            {{ d.lastSeenAt | date:'medium' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let d">

            <button mat-icon-button matTooltip="Approve"
                    *ngIf="!d.approved"
                    (click)="approve(d)">
              <mat-icon>check_circle</mat-icon>
            </button>

            <button mat-icon-button matTooltip="Revoke"
                    *ngIf="d.approved"
                    (click)="reject(d)">
              <mat-icon>cancel</mat-icon>
            </button>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      </table>

    </div>

    <div *ngIf="!loading" class="shared-paginator">
      <mat-paginator
        [length]="total"
        [pageSize]="size"
        [pageSizeOptions]="[10,25,50,100]"
        showFirstLastButtons
        (page)="changePage($event)">
      </mat-paginator>
    </div>

  </div>

</app-page-shell>
