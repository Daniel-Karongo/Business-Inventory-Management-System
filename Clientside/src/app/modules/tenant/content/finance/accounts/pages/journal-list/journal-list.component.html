<app-workflow-shell>

  <!-- =================================================== -->
  <!-- HEADER -->
  <!-- =================================================== -->

  <div workflow-header>

    <div class="page-header">

      <div class="header-content">

        <div class="eyebrow">
          Accounting
        </div>

        <h1 class="page-title">
          Transaction Records
        </h1>

        <div class="page-description">
          Review accounting transaction history,
          posting activity, and reversal traceability.
        </div>

      </div>

      <div class="header-actions">

        <button mat-flat-button color="primary" (click)="create()">

          <mat-icon>
            add
          </mat-icon>

          New Journal Entry

        </button>

      </div>

    </div>

  </div>

  <!-- =================================================== -->
  <!-- CONTENT -->
  <!-- =================================================== -->

  <div workflow-content>

    <app-workflow-card [padded]="false">

      <app-enterprise-table [loading]="loading()" [error]="error()" [hasData]="journals().length > 0"
        emptyMessage="No transaction history found">

        <div class="table-wrapper">

          <table mat-table [dataSource]="journals()" class="journal-table">

            <!-- REFERENCE -->

            <ng-container matColumnDef="reference">

              <th mat-header-cell *matHeaderCellDef>

                Reference

              </th>

              <td mat-cell *matCellDef="let row">

                <div class="reference-cell">

                  {{ row.reference }}

                </div>

              </td>

            </ng-container>

            <!-- DESCRIPTION -->

            <ng-container matColumnDef="description">

              <th mat-header-cell *matHeaderCellDef>

                Description

              </th>

              <td mat-cell *matCellDef="let row">

                <div class="description-cell">

                  {{
                  row.description
                  || 'No description'
                  }}

                </div>

              </td>

            </ng-container>

            <!-- SOURCE -->

            <ng-container matColumnDef="source">

              <th mat-header-cell *matHeaderCellDef>

                Source

              </th>

              <td mat-cell *matCellDef="let row">

                {{ row.sourceModule }}

              </td>

            </ng-container>

            <!-- POSTED -->

            <ng-container matColumnDef="postedAt">

              <th mat-header-cell *matHeaderCellDef>

                Posted

              </th>

              <td mat-cell *matCellDef="let row">

                {{
                row.postedAt
                | date:'medium'
                }}

              </td>

            </ng-container>

            <!-- STATUS -->

            <ng-container matColumnDef="status">

              <th mat-header-cell *matHeaderCellDef>

                Status

              </th>

              <td mat-cell *matCellDef="let row">

                <div class="status-chip posted">

                  Posted

                </div>

              </td>

            </ng-container>

            <!-- ACTIONS -->

            <ng-container matColumnDef="actions">

              <th mat-header-cell *matHeaderCellDef>

              </th>

              <td mat-cell *matCellDef="let row">

                <button mat-icon-button matTooltip="View transaction" (click)="view(row)">

                  <mat-icon>
                    visibility
                  </mat-icon>

                </button>

              </td>

            </ng-container>

            <tr mat-header-row *matHeaderRowDef="
                displayedColumns
              ">

            </tr>

            <tr mat-row *matRowDef="
                let row;
                columns: displayedColumns;
              ">

            </tr>

          </table>

        </div>

      </app-enterprise-table>

      <app-enterprise-paginator [page]="pageData().pageNumber" [size]="pageData().pageSize"
        [totalPages]="pageData().totalPages" [totalElements]="pageData().totalElements" [loading]="loading()"
        (pageChange)="changePage($event)" (sizeChange)="changeSize($event)">
      </app-enterprise-paginator>

    </app-workflow-card>

  </div>

</app-workflow-shell>
