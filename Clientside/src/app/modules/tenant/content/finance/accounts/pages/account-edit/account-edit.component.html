<app-workflow-shell>

  <div workflow-header>

    <div class="page-header">

      <div class="header-content">

        <div class="eyebrow">
          Accounting Setup
        </div>

        <h1 class="page-title">
          Edit Business Account
        </h1>

        <div class="page-description">
          Update account naming and
          business-facing metadata.
        </div>

      </div>

    </div>

  </div>

  <div workflow-content>

    <app-workflow-card>

      <form [formGroup]="form" class="account-form">

        <div class="form-grid">

          <!-- CODE -->

          <mat-form-field appearance="fill">

            <mat-label>
              Account Code
            </mat-label>

            <input matInput formControlName="code" />

          </mat-form-field>

          <!-- NAME -->

          <mat-form-field appearance="fill">

            <mat-label>
              Account Name
            </mat-label>

            <input matInput formControlName="name" />

          </mat-form-field>

          <!-- TYPE -->

          <mat-form-field appearance="fill">

            <mat-label>
              Classification
            </mat-label>

            <input matInput formControlName="type" />

          </mat-form-field>

        </div>

        <!-- INFO -->

        <div class="immutable-note">

          Account code and classification
          cannot be modified after creation.

        </div>

        <!-- ACTIONS -->

        <div class="form-actions">

          <button mat-stroked-button type="button" (click)="cancel()">

            Cancel

          </button>

          <button mat-flat-button color="primary" type="button" [disabled]="
              form.invalid
              || saving()
            " (click)="submit()">

            Save Changes

          </button>

        </div>

      </form>

    </app-workflow-card>

  </div>

</app-workflow-shell>
