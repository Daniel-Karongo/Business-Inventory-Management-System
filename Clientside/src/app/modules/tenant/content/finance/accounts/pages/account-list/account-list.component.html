<app-workflow-shell>

  <!-- ===================================================== -->
  <!-- HEADER -->
  <!-- ===================================================== -->

  <div workflow-header>

    <div class="page-header">

      <div class="header-content">

        <div class="eyebrow">
          Finance
        </div>

        <h1 class="page-title">
          Business Accounts
        </h1>

        <div class="page-description">
          Accounts used by your business operations,
          reporting, reconciliation, and transaction posting.
        </div>

      </div>

      <div class="header-actions">

        <button mat-flat-button color="primary" (click)="create()">

          <mat-icon>
            add
          </mat-icon>

          Create Account

        </button>

      </div>

    </div>

  </div>

  <!-- ===================================================== -->
  <!-- CONTENT -->
  <!-- ===================================================== -->

  <div workflow-content>

    <app-workflow-card class="table-card" [padded]="false">

      <app-enterprise-table [loading]="loading()" [hasData]="accounts().length > 0" [error]="error()"
        emptyMessage="No business accounts found">

        <div class="table-wrapper">

          <table mat-table [dataSource]="accounts()" class="accounts-table">

            <!-- ============================================= -->
            <!-- CODE -->
            <!-- ============================================= -->

            <ng-container matColumnDef="code">

              <th mat-header-cell *matHeaderCellDef>

                Account Code

              </th>

              <td mat-cell *matCellDef="let row">

                <div class="account-code">
                  {{ row.code }}
                </div>

              </td>

            </ng-container>

            <!-- ============================================= -->
            <!-- NAME -->
            <!-- ============================================= -->

            <ng-container matColumnDef="name">

              <th mat-header-cell *matHeaderCellDef>

                Account Name

              </th>

              <td mat-cell *matCellDef="let row">

                <div class="account-name">
                  {{ row.name }}
                </div>

              </td>

            </ng-container>

            <!-- ============================================= -->
            <!-- TYPE -->
            <!-- ============================================= -->

            <ng-container matColumnDef="type">

              <th mat-header-cell *matHeaderCellDef>

                Classification

              </th>

              <td mat-cell *matCellDef="let row">

                <div class="type-chip">

                  {{ row.type }}

                </div>

              </td>

            </ng-container>

            <!-- ============================================= -->
            <!-- ACTIONS -->
            <!-- ============================================= -->

            <ng-container matColumnDef="actions">

              <th mat-header-cell *matHeaderCellDef>

              </th>

              <td mat-cell *matCellDef="let row">

                <button mat-icon-button matTooltip="Edit account" (click)="edit(row)">

                  <mat-icon>
                    edit
                  </mat-icon>

                </button>

              </td>

            </ng-container>

            <!-- ============================================= -->
            <!-- ROWS -->
            <!-- ============================================= -->

            <tr mat-header-row *matHeaderRowDef="displayedColumns">

            </tr>

            <tr mat-row *matRowDef="
                let row;
                columns: displayedColumns;
              ">

            </tr>

          </table>

        </div>

        <app-enterprise-paginator
          [page]="pageData().pageNumber"
          [totalPages]="pageData().totalPages"
        
          [totalElements]="pageData().totalElements"
          [loading]="loading()"
          [size]="pageData().pageSize"
        
          (sizeChange)="changeSize($event)"
          (pageChange)="changePage($event)"
        >

        </app-enterprise-paginator>

      </app-enterprise-table>

    </app-workflow-card>

  </div>

</app-workflow-shell>
