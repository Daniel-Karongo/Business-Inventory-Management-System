<div class="page-container p-4">

  <div class="page-header mb-6">

    <div>
      <h2 class="text-xl font-semibold">
        Account Activity
      </h2>

      <div class="text-sm text-[var(--text-secondary)]">
        Select an account to view transaction history
      </div>
    </div>

  </div>

  <app-enterprise-table [loading]="loading" [hasData]="accounts.length > 0" emptyMessage="No accounts found">

    <div class="account-grid">

      <div *ngFor="
          let a of accounts;
          trackBy: trackByAccount
        " class="account-card" (click)="open(a.id)">

        <div class="account-top">

          <div class="account-code">
            {{ a.code }}
          </div>

          <mat-icon>
            account_balance_wallet
          </mat-icon>

        </div>

        <div class="account-name">
          {{ a.name }}
        </div>

        <div class="account-type">
          {{ a.type }}
        </div>

      </div>

    </div>

  </app-enterprise-table>

</div>
