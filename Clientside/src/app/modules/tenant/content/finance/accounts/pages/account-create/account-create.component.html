<app-workflow-shell>

  <div workflow-header>

    <div class="page-header">

      <div class="header-content">

        <div class="eyebrow">
          Accounting Setup
        </div>

        <h1 class="page-title">
          Create Business Account
        </h1>

        <div class="page-description">
          Configure a new account for
          transaction posting, reporting,
          reconciliation, and workflows.
        </div>

      </div>

    </div>

  </div>

  <div workflow-content>

    <app-workflow-card>

      <form [formGroup]="form" class="account-form">

        <div class="form-grid">

          <!-- CODE -->

          <mat-form-field appearance="fill">

            <mat-label>
              Account Code
            </mat-label>

            <input matInput formControlName="code" />

          </mat-form-field>

          <!-- NAME -->

          <mat-form-field appearance="fill">

            <mat-label>
              Account Name
            </mat-label>

            <input matInput formControlName="name" />

          </mat-form-field>

          <!-- TYPE -->

          <mat-form-field appearance="fill">

            <mat-label>
              Classification
            </mat-label>

            <mat-select formControlName="type">

              <mat-option *ngFor="
                  let type of accountTypes
                " [value]="type">

                {{ type }}

              </mat-option>

            </mat-select>

          </mat-form-field>

          <!-- ROLE -->

          <mat-form-field appearance="fill">
            <mat-label>
              Account Role
            </mat-label>

            <input matInput formControlName="role" readonly/>

            <mat-hint>
              Automatically generated from account name
            </mat-hint>
          </mat-form-field>

        </div>

        <!-- ACTIONS -->

        <div class="form-actions">

          <button mat-stroked-button type="button" (click)="cancel()">

            Cancel

          </button>

          <button mat-flat-button color="primary" type="button" [disabled]="
              form.invalid
              || saving()
            " (click)="submit()">

            Create Account

          </button>

        </div>

      </form>

    </app-workflow-card>

  </div>

</app-workflow-shell>
