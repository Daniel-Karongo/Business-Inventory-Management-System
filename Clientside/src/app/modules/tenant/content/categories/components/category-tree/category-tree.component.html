<div class="tree">

  <ng-container *ngFor="let cat of categories; trackBy: trackById">

    <div class="node" [class.deleted]="cat.deleted">

      <div class="node-content">

        <!-- EXPAND -->
        <button *ngIf="(cat.subcategories?.length ?? 0) > 0" mat-icon-button
          (click)="toggleExpand(cat.id); $event.stopPropagation()">
          <mat-icon>
            {{ expandedIds.has(cat.id) ? 'expand_more' : 'chevron_right' }}
          </mat-icon>
        </button>

        <!-- SELECT -->
        <mat-checkbox (click)="$event.stopPropagation()" [checked]="selectedIds.has(cat.id)"
          [indeterminate]="isIndeterminate(cat)" (change)="toggleSelect(cat.id)">
        </mat-checkbox>

        <!-- NAME -->
        <div class="tree-name" [class.active]="cat.id === activeId" (click)="navigate(cat.id)">

          {{ cat.name }}

          <button mat-icon-button class="view-btn" matTooltip="View category" matTooltipPosition="above"
            (click)="navigate(cat.id); $event.stopPropagation()">

            <mat-icon>open_in_new</mat-icon>
          </button>
        </div>

      </div>

      <div class="children" *ngIf="expandedIds.has(cat.id)">

        <app-category-tree [categories]="cat.subcategories ?? []" [selectedIds]="selectedIds"
          [expandedIds]="expandedIds" (select)="select.emit($event)">
        </app-category-tree>

      </div>

    </div>

  </ng-container>

</div>
