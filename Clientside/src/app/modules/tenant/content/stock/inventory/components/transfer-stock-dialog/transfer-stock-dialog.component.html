<div class="dialog-shell">

  <div class="dialog-header">
    <div class="title-block">
      <h2>Transfer Stock</h2>

      <div class="subtitle">
        Move inventory between branches
      </div>
    </div>
  </div>

  <mat-dialog-content [formGroup]="form" class="dialog-content">

    <div class="context-card">

      <div class="context-top">

        <div>
          <div class="context-title">
            {{ data.productName }}
          </div>

          <div class="context-meta">
            {{ data.classification }} • {{ data.fromBranchName }}
          </div>
        </div>

        <div class="context-badge">
          Stock Transfer
        </div>

      </div>

      <div class="availability-row">

        <div class="availability-label">
          Available Stock
        </div>

        <div class="availability-value">
          {{ data.available }}
        </div>

      </div>

    </div>

    <div class="section-card">

      <div class="section-title">
        Destination
      </div>

      <mat-form-field appearance="fill">
        <mat-label>Destination Branch</mat-label>

        <mat-select formControlName="toBranchId">
          <mat-option *ngFor="let b of branches" [value]="b.id">
            {{ b.name }}
          </mat-option>
        </mat-select>

      </mat-form-field>

    </div>

    <div class="section-card">

      <div class="section-title">
        Transfer Details
      </div>

      <div class="grid-2">

        <mat-form-field appearance="fill">
          <mat-label>Quantity</mat-label>
          <input matInput type="number" formControlName="quantity" />
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Destination Unit Cost</mat-label>
          <input matInput type="number" formControlName="destinationUnitCost" />
        </mat-form-field>

      </div>

      <mat-form-field appearance="fill">
        <mat-label>Reference</mat-label>
        <input matInput formControlName="reference" />
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Note</mat-label>

        <textarea matInput rows="4" formControlName="note">
        </textarea>
      </mat-form-field>

    </div>

  </mat-dialog-content>

  <div class="dialog-footer">

    <button mat-stroked-button (click)="close()">
      Cancel
    </button>

    <button mat-flat-button [disabled]="loading || form.invalid" (click)="submit()">
      Transfer Stock
    </button>

  </div>

</div>
