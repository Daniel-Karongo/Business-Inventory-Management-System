<div class="supplier-shell">

    <div *ngFor="let row of rows.controls; let i = index" [formGroup]="row" class="supplier-row">

        <div class="supplier-select-shell">

            <mat-form-field appearance="fill">

                <mat-label>
                    Supplier
                </mat-label>

                <mat-select formControlName="supplierId">

                    <mat-option [value]="NEW_SUPPLIER">
                        + Create New Supplier
                    </mat-option>

                    <mat-option *ngFor="let supplier of suppliers" [value]="supplier.id">
                        {{ supplier.name }}
                    </mat-option>

                </mat-select>

            </mat-form-field>

            <mat-form-field *ngIf="isCreatingSupplier(i)" appearance="fill">

                <mat-label>
                    New Supplier Name
                </mat-label>

                <input matInput formControlName="supplierName" />

            </mat-form-field>

        </div>

        <mat-form-field appearance="fill">

            <mat-label>
                Packaging
            </mat-label>

            <mat-select formControlName="packagingTempId">

                <mat-option *ngFor="
            let packaging
            of packagings
          " [value]="
            packaging.tempId
          ">

                    {{
                    packaging.name
                    }}

                </mat-option>

            </mat-select>

        </mat-form-field>

        <mat-form-field appearance="fill">

            <mat-label>
                Quantity
            </mat-label>

            <input matInput type="number" formControlName="quantity" />

        </mat-form-field>

        <mat-form-field appearance="fill">

            <mat-label>
                Unit Cost
            </mat-label>

            <input matInput type="number" formControlName="unitCost" />

        </mat-form-field>

        <button mat-stroked-button color="warn" type="button" (click)="
        removeRow(i)
      ">

            Remove

        </button>

    </div>

    <button mat-flat-button color="primary" type="button" (click)="addRow()">

        Add Supplier

    </button>

</div>
