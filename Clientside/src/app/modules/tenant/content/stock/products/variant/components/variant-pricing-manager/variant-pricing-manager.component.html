<div class="manager">

    <div class="header">

        <div class="header-info">

            <h2>Pricing</h2>

            <span>
                {{ pricing.length }}
                pricing rule{{
                pricing.length === 1 ? '' : 's'
                }}
            </span>

        </div>

        <button mat-flat-button color="primary" type="button" (click)="create()">

            <mat-icon>add</mat-icon>
            Add Pricing

        </button>

    </div>

    <div class="empty" *ngIf="!pricing.length">

        No pricing configured.

    </div>

    <div class="pricing-cards" *ngIf="pricing.length > 0">

        <div class="pricing-card" *ngFor="let p of pricing">

            <div class="row">

                <span class="label">
                    Packaging
                </span>

                <span class="value">
                    {{ packagingName(p.packagingId) }}
                </span>

            </div>

            <div class="row">

                <span class="label">
                    Minimum Qty
                </span>

                <span class="value">
                    {{ p.minQuantity }}
                </span>

            </div>

            <div class="row">

                <span class="label">
                    Price
                </span>

                <span class="price">
                    {{ p.price | number:'1.2-2' }}
                </span>

            </div>

            <div class="actions">

                <button mat-icon-button matTooltip="Edit Pricing" (click)="edit(p)">

                    <mat-icon>
                        edit
                    </mat-icon>

                </button>

                <button mat-icon-button color="warn" matTooltip="Delete Pricing" (click)="remove(p)">

                    <mat-icon>
                        delete_outline
                    </mat-icon>

                </button>

            </div>

        </div>

    </div>

</div>
