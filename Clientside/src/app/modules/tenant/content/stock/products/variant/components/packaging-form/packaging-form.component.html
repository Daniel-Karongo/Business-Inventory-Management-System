<div class="dialog-shell">

    <div class="dialog-header">

        <div class="header-title">
            {{ data.editMode ? 'Edit Packaging' : 'Create Packaging' }}
        </div>

        <div class="header-subtitle">
            Configure packaging units and conversion ratios
        </div>

    </div>

    <mat-dialog-content>

        <form [formGroup]="form" class="enterprise-form">

            <div class="form-grid">

                <mat-form-field appearance="outline">

                    <mat-label>
                        Packaging Name
                    </mat-label>

                    <input matInput formControlName="name" placeholder="Box, Carton, Crate, Pallet...">

                </mat-form-field>

                <mat-form-field appearance="outline">

                    <mat-label>
                        Units Per Packaging
                    </mat-label>

                    <input matInput type="number" formControlName="unitsPerPackaging">

                </mat-form-field>

            </div>

            <div class="warning-panel" *ngIf="data.packaging?.isBaseUnit">

                <div class="warning-title">
                    Base Packaging
                </div>

                <div class="warning-text">
                    Base packaging always represents
                    one unit and its conversion
                    ratio cannot be modified.
                </div>

            </div>

        </form>

    </mat-dialog-content>

    <mat-dialog-actions align="end">

        <button mat-stroked-button type="button" (click)="close()">

            Cancel

        </button>

        <button mat-flat-button color="primary" type="button" [disabled]="saving" (click)="submit()">

            {{ saving ? 'Saving...' : 'Save Packaging' }}

        </button>

    </mat-dialog-actions>

</div>
