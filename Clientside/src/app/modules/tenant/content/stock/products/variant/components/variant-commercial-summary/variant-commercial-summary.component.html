<mat-accordion class="commercial-accordion">

    <mat-expansion-panel (opened)="toggle(true)" (closed)="toggle(false)">

        <mat-expansion-panel-header>

            <mat-panel-title>

                {{ variant.classification }}

            </mat-panel-title>

            <mat-panel-description>

                <div class="header-stats">

                    <div class="stat-chip">

                        {{ packagings.length }}

                        Packaging

                    </div>

                    <div class="stat-chip">

                        {{ pricing.length }}

                        Pricing

                    </div>

                </div>

            </mat-panel-description>

        </mat-expansion-panel-header>

        <div *ngIf="loading && expanded" class="loading-state">

            Loading commercial configuration...

        </div>

        <ng-container *ngIf="
                !loading &&
                expanded
            ">

            <div class="kpi-grid">

                <div class="kpi-card">

                    <div class="kpi-value">
                        {{ packagings.length }}
                    </div>

                    <div class="kpi-label">
                        Packaging Configurations
                    </div>

                </div>

                <div class="kpi-card">

                    <div class="kpi-value">
                        {{ pricing.length }}
                    </div>

                    <div class="kpi-label">
                        Pricing Rules
                    </div>

                </div>

            </div>

            <ng-container *ngIf="!isMobile; else mobileLayout">

                <mat-tab-group dynamicHeight>

                    <mat-tab label="Packaging">
                        <div class="tab-content">

                            <app-variant-packaging-manager [variantId]="variant.id" [branchId]="branchId"
                                [packagings]="packagings" (refreshRequested)="load()">
                            </app-variant-packaging-manager>

                            <app-packaging-conversion-table *ngIf="hasMeaningfulPackagingConversions()"
                                [packaging]="packagings">
                            </app-packaging-conversion-table>

                        </div>
                    </mat-tab>

                    <mat-tab label="Pricing">
                        <div class="tab-content">

                            <app-variant-pricing-manager [variantId]="variant.id" [packaging]="packagings"
                                [pricing]="pricing" (refreshRequested)="load()">
                            </app-variant-pricing-manager>

                            <app-pricing-tier-table *ngIf="hasMeaningfulPricingTiers()" [pricing]="pricing"
                                [packaging]="packagings">
                            </app-pricing-tier-table>

                        </div>
                    </mat-tab>

                </mat-tab-group>

            </ng-container>

            <ng-template #mobileLayout>

                <div class="mobile-section">

                    <div class="mobile-section-title">
                        Packaging
                    </div>

                    <app-variant-packaging-manager [variantId]="variant.id" [branchId]="branchId"
                        [packagings]="packagings" (refreshRequested)="load()">
                    </app-variant-packaging-manager>

                    <app-packaging-conversion-table *ngIf="hasMeaningfulPackagingConversions()"
                        [packaging]="packagings">
                    </app-packaging-conversion-table>

                </div>

                <div class="mobile-section">

                    <div class="mobile-section-title">
                        Pricing
                    </div>

                    <app-variant-pricing-manager [variantId]="variant.id" [packaging]="packagings" [pricing]="pricing"
                        (refreshRequested)="load()">
                    </app-variant-pricing-manager>

                    <app-pricing-tier-table *ngIf="hasMeaningfulPricingTiers()" [pricing]="pricing"
                        [packaging]="packagings">
                    </app-pricing-tier-table>

                </div>

            </ng-template>

        </ng-container>

    </mat-expansion-panel>

</mat-accordion>
