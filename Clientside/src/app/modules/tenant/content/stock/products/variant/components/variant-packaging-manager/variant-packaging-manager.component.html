<div class="manager">

    <div class="header">

        <div class="header-info">
            <h2>Packaging</h2>
            <span>
                {{ packagings.length }} configuration{{
                packagings.length === 1 ? '' : 's'
                }}
            </span>
        </div>

        <button mat-flat-button color="primary" type="button" (click)="create()">

            <mat-icon>add</mat-icon>
            Add Packaging

        </button>

    </div>

    <div class="empty" *ngIf="!packagings.length">

        No packaging configured.

    </div>

    <div class="cards" *ngIf="packagings.length > 0">

        <div class="card" *ngFor="let p of packagings">

            <div class="card-header">

                <div class="details">

                    <div class="title">
                        {{ p.name }}
                    </div>

                    <div class="meta">
                        {{ p.unitsPerPackaging }} units
                    </div>

                </div>

                <span class="base" *ngIf="p.isBaseUnit">

                    Base

                </span>

            </div>

            <div class="card-actions">

                <button mat-icon-button matTooltip="Edit Packaging" (click)="edit(p)">

                    <mat-icon>
                        edit
                    </mat-icon>

                </button>

                <button mat-icon-button color="warn" matTooltip="Delete Packaging" (click)="remove(p)">

                    <mat-icon>
                        delete_outline
                    </mat-icon>

                </button>

            </div>

        </div>

    </div>

</div>
