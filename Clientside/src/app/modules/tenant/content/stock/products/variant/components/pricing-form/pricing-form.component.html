<div class="dialog-shell">

    <div class="dialog-header">

        <div class="header-title">
            {{ data.editMode ? 'Edit Pricing Rule' : 'Create Pricing Rule' }}
        </div>

        <div class="header-subtitle">
            Configure packaging pricing and quantity thresholds
        </div>

    </div>

    <mat-dialog-content>

        <form [formGroup]="form" class="enterprise-form">

            <div class="form-grid">

                <mat-form-field appearance="fill">

                    <mat-label>Packaging</mat-label>

                    <mat-select formControlName="packagingId">

                        <mat-option *ngFor="let p of data.packaging" [value]="p.packagingId">

                            {{ p.name }}
                            ({{ p.unitsPerPackaging }} units)

                        </mat-option>

                    </mat-select>

                </mat-form-field>

                <mat-form-field appearance="fill">

                    <mat-label>Selling Price</mat-label>

                    <input matInput type="number" formControlName="price">

                </mat-form-field>

                <mat-form-field appearance="fill">

                    <mat-label>Minimum Quantity</mat-label>

                    <input matInput type="number" formControlName="minQuantity">

                </mat-form-field>

            </div>

        </form>

    </mat-dialog-content>

    <mat-dialog-actions align="end">

        <button mat-stroked-button type="button" (click)="close()">

            Cancel

        </button>

        <button mat-flat-button color="primary" type="button" [disabled]="saving" (click)="submit()">

            {{ saving ? 'Saving...' : 'Save Pricing' }}

        </button>

    </mat-dialog-actions>

</div>
