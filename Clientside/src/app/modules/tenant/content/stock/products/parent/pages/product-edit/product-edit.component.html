<div class="page-container" *ngIf="!loading">

  <div class="page-header">

    <div>
      <h1>Edit Product</h1>

      <span class="status-pill" [ngClass]="product.deleted ? 'status-deleted' : 'status-active'">
        {{ product.deleted ? 'Deleted' : 'Active' }}
      </span>
    </div>

  </div>

  <div class="warning" *ngIf="product.deleted">
    This product is deleted and cannot be edited.
  </div>

  <app-product-form [initialValue]="product" [editMode]="true" (submitForm)="handleSubmit($event)" (cancel)="cancel()">
  </app-product-form>

</div>

<div *ngIf="loading" class="loading">
  Loading product...
</div>
