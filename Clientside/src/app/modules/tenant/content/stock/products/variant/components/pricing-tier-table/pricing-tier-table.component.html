<div class="tier-table">

    <div class="packaging-block" *ngFor="let p of packaging">

        <div class="packaging-header">

            <div>

                <div class="title">
                    {{ p.name }}
                </div>

                <div class="meta">
                    {{ p.unitsPerPackaging }} units
                </div>

            </div>

        </div>

        <div class="empty" *ngIf="!rows(p.packagingId).length">

            No pricing tiers configured

        </div>

        <div class="pricing-cards" *ngIf="rows(p.packagingId).length">

            <div class="pricing-card" *ngFor="let row of rows(p.packagingId)">

                <div class="pricing-row">

                    <span class="label">
                        Minimum Quantity
                    </span>

                    <span class="value">
                        {{ row.minQuantity }}
                    </span>

                </div>

                <div class="pricing-row">

                    <span class="label">
                        Price
                    </span>

                    <span class="price">
                        {{ row.price | number:'1.2-2' }}
                    </span>

                </div>

            </div>

        </div>

    </div>

</div>
