<div class="barcode-dialog">

    <div class="dialog-header">

        <div>

            <div class="dialog-title">
                Variant Barcode
            </div>

            <div class="dialog-subtitle">
                {{ data.variantName }}
            </div>

        </div>

    </div>

    <mat-dialog-content>

        <div *ngIf="loading" class="loading-state">

            <mat-spinner diameter="40">
            </mat-spinner>

        </div>

        <div *ngIf="
                !loading &&
                !barcodeUrl
            " class="empty-state">

            <mat-icon>
                qr_code_2
            </mat-icon>

            <h3>
                Barcode Unavailable
            </h3>

            <p>
                This variant does not
                currently have a generated
                barcode.
            </p>

        </div>

        <div *ngIf="
                !loading &&
                barcodeUrl
            " class="barcode-container">

            <div class="barcode-card">

                <img [src]="barcodeUrl" [alt]="data.variantName">

            </div>

        </div>

    </mat-dialog-content>

    <mat-dialog-actions align="end">

        <button mat-stroked-button *ngIf="barcodeUrl" (click)="download()">

            <mat-icon>
                download
            </mat-icon>

            Download

        </button>

        <button mat-flat-button color="primary" *ngIf="barcodeUrl" (click)="print()">

            <mat-icon>
                print
            </mat-icon>

            Print

        </button>

    </mat-dialog-actions>

</div>
