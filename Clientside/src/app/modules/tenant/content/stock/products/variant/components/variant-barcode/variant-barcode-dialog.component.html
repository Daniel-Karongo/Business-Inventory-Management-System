<h2 mat-dialog-title>
    Variant Barcode
</h2>

<mat-dialog-content>

    <div class="barcode-wrapper">

        <img *ngIf="barcodeUrl" [src]="barcodeUrl">

    </div>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button mat-stroked-button (click)="print()">

        Print

    </button>

</mat-dialog-actions>
