<div class="images-dialog">

    <div class="dialog-header">

        <div>

            <div class="dialog-title">
                Variant Images
            </div>

            <div class="dialog-subtitle">
                {{ data.variantName }}
            </div>

        </div>

    </div>

    <mat-dialog-content>

        <div *ngIf="loading" class="loading-state">

            <mat-spinner diameter="40">
            </mat-spinner>

        </div>

        <div *ngIf="
                !loading &&
                !images.length
            " class="empty-state">

            <mat-icon>
                image_not_supported
            </mat-icon>

            <h3>
                No Images Available
            </h3>

            <p>
                This variant currently has
                no uploaded images.
            </p>

        </div>

        <div *ngIf="
                !loading &&
                images.length
            " class="image-grid">

            <div *ngFor="let image of images" class="image-card">

                <img class="image-preview" [src]="image.url" [alt]="image.fileName">

                <div class="image-meta">

                    <div class="file-name">
                        {{ image.fileName }}
                    </div>

                </div>

            </div>

        </div>

    </mat-dialog-content>

    <mat-dialog-actions align="end">

        <button mat-stroked-button (click)="downloadZip()">

            <mat-icon>
                download
            </mat-icon>

            Download ZIP

        </button>

    </mat-dialog-actions>

</div>
