<div class="dialog-header">

    <div class="dialog-title">
        Edit Variant
    </div>

    <div class="dialog-subtitle">
        {{ variant.classification }}
    </div>

</div>

<mat-dialog-content *ngIf="form">

    <div class="content-wrapper" [formGroup]="form">

        <div class="summary-grid">

            <div class="summary-card">

                <div class="label">
                    Barcode
                </div>

                <div class="value">
                    {{ variant.barcode || '—' }}
                </div>

            </div>

            <div class="summary-card">

                <div class="label">
                    Variant ID
                </div>

                <div class="value mono">
                    {{ variant.id }}
                </div>

            </div>

        </div>

        <div class="section">

            <div class="section-title">
                Variant Information
            </div>

            <div class="form-grid">

                <mat-form-field appearance="fill">

                    <mat-label>
                        Classification
                    </mat-label>

                    <input matInput formControlName="classification">

                </mat-form-field>

                <mat-form-field appearance="fill">

                    <mat-label>
                        SKU
                    </mat-label>

                    <input matInput formControlName="sku">

                </mat-form-field>

            </div>

        </div>

        <div class="section">

            <div class="section-title">
                Profit Controls
            </div>

            <div class="form-grid">

                <mat-form-field appearance="fill">

                    <mat-label>
                        Minimum Percentage Profit
                    </mat-label>

                    <input matInput type="number" formControlName="minimumPercentageProfit">

                </mat-form-field>

                <mat-form-field appearance="fill">

                    <mat-label>
                        Minimum Profit
                    </mat-label>

                    <input matInput type="number" formControlName="minimumProfit">

                </mat-form-field>

            </div>

        </div>

    </div>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button mat-button (click)="cancel()">

        Cancel

    </button>

    <button mat-flat-button color="primary" [disabled]="saving" (click)="save()">

        <span *ngIf="!saving">
            Save Changes
        </span>

        <span *ngIf="saving">
            Saving...
        </span>

    </button>

</mat-dialog-actions>
