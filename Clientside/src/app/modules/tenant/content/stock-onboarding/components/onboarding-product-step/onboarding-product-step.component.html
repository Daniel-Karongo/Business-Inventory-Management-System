<div class="step-shell">

    <!-- MODE -->

    <div class="mode-switch">

        <button mat-stroked-button type="button" [class.active]="
        mode === 'NEW_PRODUCT'
      " (click)="
        switchMode(
          'NEW_PRODUCT'
        )
      ">

            New Product

        </button>

        <button mat-stroked-button type="button" [class.active]="
        mode ===
        'EXISTING_PRODUCT'
      " (click)="
        switchMode(
          'EXISTING_PRODUCT'
        )
      ">

            Existing Product

        </button>

    </div>

    <!-- EXISTING -->

    <div *ngIf="
      mode ===
      'EXISTING_PRODUCT'
    " class="existing-shell">

        <button mat-flat-button color="primary" type="button" (click)="
        openProductSelector()
      ">

            <mat-icon>
                inventory_2
            </mat-icon>

            Select Product

        </button>

        <div *ngIf="
        selectedProduct
      " class="selected-product">

            <div class="product-name">
                {{
                selectedProduct.name
                }}
            </div>

            <div class="product-meta">

                SKU:
                {{
                selectedProduct.sku
                || '—'
                }}

            </div>

        </div>

    </div>

    <!-- NEW -->

    <form *ngIf="
      mode ===
      'NEW_PRODUCT'
    " [formGroup]="form" class="form-grid">

        <mat-form-field appearance="fill">

            <mat-label>
                Branch
            </mat-label>

            <mat-select formControlName="
          branchId
        ">

                <mat-option *ngFor="
            let branch
            of branches
          " [value]="branch.id">

                    {{ branch.name }}

                </mat-option>

            </mat-select>

        </mat-form-field>

        <mat-form-field appearance="fill">

            <mat-label>
                Product Name
            </mat-label>

            <input matInput formControlName="
          name
        " />

        </mat-form-field>

        <mat-form-field appearance="fill">

            <mat-label>
                Category
            </mat-label>

            <mat-select formControlName="
          categoryId
        ">

                <mat-option *ngFor="
            let category
            of categories
          " [value]="
            category.id
          ">

                    {{
                    category.name
                    }}

                </mat-option>

            </mat-select>

        </mat-form-field>

        <mat-form-field appearance="fill">

            <mat-label>
                Minimum %
                Profit
            </mat-label>

            <input matInput type="number" formControlName="
          minimumPercentageProfit
        " />

        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">

            <mat-label>
                Description
            </mat-label>

            <textarea matInput rows="4" formControlName="
          description
        ">
      </textarea>

        </mat-form-field>

    </form>

</div>
