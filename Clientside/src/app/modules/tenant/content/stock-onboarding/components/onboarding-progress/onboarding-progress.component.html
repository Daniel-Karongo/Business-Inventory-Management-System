<div class="progress-shell">

    <div *ngFor="
      let step of steps;
      let i = index
    " class="step-item" [class.active]="i === currentStep" [class.complete]="i < currentStep">

        <div class="step-index">
            {{ i + 1 }}
        </div>

        <div class="step-label">
            {{ step }}
        </div>

    </div>

</div>
