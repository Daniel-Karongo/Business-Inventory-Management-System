<div class="rollcall-desktop">

  <table mat-table [dataSource]="rollcalls" class="rollcall-table">

    <!-- keep current columns unchanged -->

    <ng-container matColumnDef="time">
      <th mat-header-cell *matHeaderCellDef>Time</th>
      <td mat-cell *matCellDef="let r">
        {{ r.timestamp | date:DATE_FORMAT }}
      </td>
    </ng-container>

    <ng-container matColumnDef="branch">
      <th mat-header-cell *matHeaderCellDef>Branch</th>
      <td mat-cell *matCellDef="let r">
        {{ r.branchName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let r">
        <div>
          <span class="status-pill" [class.present]="r.status === 'PRESENT'" [class.late]="r.status === 'LATE'"
            [class.absent]="r.status === 'ABSENT'">
            {{ r.status }}
          </span>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="method">
      <th mat-header-cell *matHeaderCellDef>Method</th>
      <td mat-cell *matCellDef="let r">
        {{ r.method }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  </table>

</div>

<div class="rollcall-mobile">

  <div class="rollcall-card" *ngFor="let r of rollcalls">

    <div><strong>Time</strong> {{ r.timestamp | date:DATE_FORMAT }}</div>
    <div><strong>Branch</strong> {{ r.branchName }}</div>
    <div><strong>Status</strong>
        <span class="status-pill" [class.present]="r.status === 'PRESENT'" [class.late]="r.status === 'LATE'"
          [class.absent]="r.status === 'ABSENT'">
          {{ r.status }}
        </span>
    </div>
    <div><strong>Method</strong> {{ r.method }}</div>

  </div>

</div>
