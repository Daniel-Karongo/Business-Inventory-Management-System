<form [formGroup]="form" #dialogRoot class="bulk-sale-form" (keydown.enter)="
    $event.stopPropagation()
  ">

  <app-bulk-import-shell [title]="config.title" [rowCount]="rowCount" [submitting]="submitting"
    [formInvalid]="form.invalid" [loading]="
      submitting ||
      loading
    " [progress]="progress" loadingLabel="
      Processing sales import...
    " (importCsv)="
      importCsv($event)
    " (importExcel)="
      importExcel($event)
    " (downloadCsv)="
      downloadCsvTemplate()
    " (downloadExcel)="
      downloadExcelTemplate()
    " (submit)="submit()" (cancel)="close()" (goToLine)="
      goToLine($event)
    " (goTop)="
      scrollToTop()
    " (goBottom)="
      scrollToBottom()
    " (prevError)="
      goToPreviousError()
    " (nextError)="
      goToNextError()
    " (clearAll)="
      clearRows()
    " (exportCsv)="
      exportCsvCurrentRows()
    " (exportExcel)="
      exportExcelCurrentRows()
    ">

    <!-- =============================================== -->
    <!-- BODY -->
    <!-- =============================================== -->

    <div class="sales-body">

      <!-- =========================================== -->
      <!-- OPTIONS -->
      <!-- =========================================== -->

      <div bulk-options class="options-grid">

        <mat-checkbox formControlName="dryRun">

          Dry Run Validation

        </mat-checkbox>

        <mat-form-field appearance="outline">

          <mat-label>
            Import Mode
          </mat-label>

          <mat-select formControlName="mode">

            <mat-option value="OPERATIONAL">

              Operational

            </mat-option>

            <mat-option value="HISTORICAL">

              Historical

            </mat-option>

          </mat-select>

        </mat-form-field>

      </div>

      <!-- =========================================== -->
      <!-- ROWS -->
      <!-- =========================================== -->

      <div class="rows" formArrayName="rows">

        <div class="row-card" *ngFor="
            let row of rows.controls;
            let i = index
          " [formGroupName]="i">

          <!-- ===================================== -->
          <!-- HEADER -->
          <!-- ===================================== -->

          <div class="row-header">

            <div class="row-title">

              Line {{ i + 1 }}

            </div>

            <button mat-icon-button type="button" color="warn" (click)="removeRow(i)">

              <mat-icon>
                delete
              </mat-icon>

            </button>

          </div>

          <!-- ===================================== -->
          <!-- GRID 1 -->
          <!-- ===================================== -->

          <div class="grid-3">

            <mat-form-field appearance="outline">

              <mat-label>
                Receipt No
              </mat-label>

              <input matInput formControlName="receiptNo" />

            </mat-form-field>

            <mat-form-field appearance="outline">

              <mat-label>
                SKU
              </mat-label>

              <input matInput formControlName="sku" />

            </mat-form-field>

            <mat-form-field appearance="outline">

              <mat-label>
                Product
              </mat-label>

              <input matInput formControlName="productName" />

            </mat-form-field>

          </div>

          <!-- ===================================== -->
          <!-- GRID 2 -->
          <!-- ===================================== -->

          <div class="grid-3">

            <mat-form-field appearance="outline">

              <mat-label>
                Variant
              </mat-label>

              <input matInput formControlName="variant" />

            </mat-form-field>

            <mat-form-field appearance="outline">

              <mat-label>
                Quantity
              </mat-label>

              <input matInput type="number" formControlName="quantity" />

            </mat-form-field>

            <mat-form-field appearance="outline">

              <mat-label>
                Unit Price
              </mat-label>

              <input matInput type="number" formControlName="unitPrice" />

            </mat-form-field>

          </div>

          <!-- ===================================== -->
          <!-- GRID 3 -->
          <!-- ===================================== -->

          <div class="grid-3">

            <mat-form-field appearance="outline">

              <mat-label>
                Branch Code
              </mat-label>

              <input matInput formControlName="branchCode" />

            </mat-form-field>

            <mat-form-field appearance="outline">

              <mat-label>
                Sale Date
              </mat-label>

              <input matInput [matDatepicker]="picker" formControlName="saleDate" />

              <mat-datepicker-toggle matSuffix [for]="picker">
              </mat-datepicker-toggle>

              <mat-datepicker #picker>
              </mat-datepicker>

            </mat-form-field>

            <mat-form-field appearance="outline">

              <mat-label>
                Payments
              </mat-label>

              <input matInput formControlName="payments" placeholder="
                  CASH|1000
                " />

            </mat-form-field>

          </div>

          <!-- ===================================== -->
          <!-- ERROR -->
          <!-- ===================================== -->

          <div class="row-error" *ngIf="
              row.value._error
            ">

            {{ row.value._error }}

          </div>

        </div>

      </div>

      <!-- =========================================== -->
      <!-- ADD ROW -->
      <!-- =========================================== -->

      <button mat-stroked-button type="button" (click)="addRow()">

        <mat-icon>
          add
        </mat-icon>

        Add Line

      </button>

      <div #bottomAnchor>
      </div>

    </div>

  </app-bulk-import-shell>

</form>
