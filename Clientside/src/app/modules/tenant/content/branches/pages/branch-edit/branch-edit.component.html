<app-workflow-shell>

  <div workflow-header>

    <div>

      <h1 class="page-title">
        Edit Branch
      </h1>

      <div class="page-subtitle">

        {{
          branch?.name || 'Loading...'
        }}

      </div>

    </div>

  </div>

  <div workflow-content>

    <app-workflow-card>

      <app-branch-form
        *ngIf="branch"
        [initial]="branch"
        [loading]="saving"
        submitLabel="Save Changes"
        [users]="users"
        [(userIds)]="userIds"
        (submitted)="save($event)">
      </app-branch-form>

    </app-workflow-card>

  </div>

</app-workflow-shell>
