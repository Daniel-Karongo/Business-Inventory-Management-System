<app-workflow-shell>

  <div workflow-header>

    <div>

      <h1 class="page-title">
        Create Branch
      </h1>

      <div class="page-subtitle">
        Configure a new operational branch workspace
      </div>

    </div>

  </div>

  <div workflow-content>

    <app-workflow-card>

      <app-branch-form [loading]="loading" submitLabel="Create Branch" [users]="users" 
        [(userIds)]="userIds" (submitted)="save($event)">
      </app-branch-form>

    </app-workflow-card>

  </div>

</app-workflow-shell>
