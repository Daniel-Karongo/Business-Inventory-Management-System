<app-workflow-card>

    <div class="settings-shell">

        <div class="settings-toolbar">

            <div>

                <div class="settings-kicker">
                    Email Infrastructure
                </div>

                <h2 class="settings-heading">
                    SMTP Configuration
                </h2>

            </div>

            <button mat-flat-button color="primary" (click)="save()" [disabled]="saving || form.pristine">

                <ng-container *ngIf="!saving">
                    Save Changes
                </ng-container>

                <mat-spinner *ngIf="saving" diameter="18">
                </mat-spinner>

            </button>

        </div>

        <form [formGroup]="form" class="settings-grid">

            <mat-slide-toggle formControlName="enabled">

                Enable Email

            </mat-slide-toggle>

            <mat-slide-toggle formControlName="active">

                Active

            </mat-slide-toggle>

            <mat-form-field appearance="fill">

                <mat-label>
                    SMTP Host
                </mat-label>

                <input matInput formControlName="host">

            </mat-form-field>

            <mat-form-field appearance="fill">

                <mat-label>
                    SMTP Port
                </mat-label>

                <input matInput type="number" formControlName="port">

            </mat-form-field>

            <mat-form-field appearance="fill">

                <mat-label>
                    Username
                </mat-label>

                <input matInput formControlName="username">

            </mat-form-field>

            <mat-form-field appearance="fill">

                <mat-label>
                    Password
                </mat-label>

                <input matInput type="password" formControlName="password">

            </mat-form-field>

            <mat-form-field appearance="fill">

                <mat-label>
                    From Address
                </mat-label>

                <input matInput formControlName="fromAddress">

            </mat-form-field>

            <mat-slide-toggle formControlName="authEnabled">

                Authentication Enabled

            </mat-slide-toggle>

            <mat-slide-toggle formControlName="tlsEnabled">

                TLS Enabled

            </mat-slide-toggle>

        </form>

    </div>

</app-workflow-card>
