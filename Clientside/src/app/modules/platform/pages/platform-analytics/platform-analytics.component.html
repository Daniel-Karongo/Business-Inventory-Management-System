<div class="analytics-page">

  <div class="header">

    <h1>Tenant Usage Analytics</h1>

  </div>

  <mat-card>

    <table mat-table [dataSource]="metrics">

      <ng-container matColumnDef="tenantId">

        <th mat-header-cell *matHeaderCellDef>
          Tenant
        </th>

        <td mat-cell *matCellDef="let m">
          {{ m.tenantId }}
        </td>

      </ng-container>

      <ng-container matColumnDef="requests">

        <th mat-header-cell *matHeaderCellDef>
          Requests
        </th>

        <td mat-cell *matCellDef="let m">
          {{ m.requests }}
        </td>

      </ng-container>

      <ng-container matColumnDef="errors">

        <th mat-header-cell *matHeaderCellDef>
          Errors
        </th>

        <td mat-cell *matCellDef="let m">
          {{ m.errors }}
        </td>

      </ng-container>

      <ng-container matColumnDef="snapshotTime">

        <th mat-header-cell *matHeaderCellDef>
          Time
        </th>

        <td mat-cell *matCellDef="let m">
          {{ m.snapshotTime | date:'short' }}
        </td>

      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    </table>

  </mat-card>

</div>
