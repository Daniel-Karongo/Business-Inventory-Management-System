<div class="sidebar-shell">

    <div class="p-4 border-b dark:border-gray-700 flex items-center gap-3"
        [class.justify-center]="sidebar.isCollapsed$ | async">

        <ng-container *ngIf="sidebar.isCollapsed$ | async; else expandedBrand">

            <ng-container *ngIf="logo$ | async as logo; else fallbackCollapsed">
                <img [src]="logo" class="w-10 h-10 object-contain" />
            </ng-container>

            <ng-template #fallbackCollapsed>
                <div class="w-10 h-10 rounded-md bg-sky-600 text-white flex items-center justify-center font-bold">
                    BM
                </div>
            </ng-template>

        </ng-container>

        <!-- EXPANDED -->
        <ng-template #expandedBrand>

            <ng-container *ngIf="logo$ | async as logo; else fallbackExpanded">

                <img [src]="logo" class="w-10 h-10 object-contain" />

            </ng-container>

            <ng-template #fallbackExpanded>

                <div class="w-10 h-10 rounded-md bg-sky-600 text-white flex items-center justify-center font-bold">
                    BM
                </div>

            </ng-template>

            <div>
                <div class="text-lg font-semibold">Business Manager</div>
                <div class="text-xs text-gray-500 dark:text-gray-400">Admin</div>
            </div>

        </ng-template>

    </div>

    <nav class="nav">

        <a *ngFor="let item of items" [routerLink]="item.route" routerLinkActive="active" class="nav-link"
            [matTooltip]="(sidebar.isCollapsed$ | async) ? item.label : ''" matTooltipPosition="right">

            <mat-icon>
                {{ item.icon }}
            </mat-icon>

            <span *ngIf="!(sidebar.isCollapsed$ | async)">
                {{ item.label }}
            </span>

        </a>

    </nav>

</div>
