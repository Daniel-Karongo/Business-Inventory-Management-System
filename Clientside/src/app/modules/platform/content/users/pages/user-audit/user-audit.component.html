<app-page-shell>

    <div page-header>

        <div class="hero">

            <h2>
                User Audit History
            </h2>

            <button mat-stroked-button (click)="back()">
                Back
            </button>

        </div>

    </div>

    <div page-content>

        <div class="table-wrap">

            <table mat-table [dataSource]="rows">

                <ng-container matColumnDef="timestamp">

                    <th mat-header-cell *matHeaderCellDef>
                        Time
                    </th>

                    <td mat-cell *matCellDef="let r">

                        {{r.timestamp|date:'medium'}}

                    </td>

                </ng-container>


                <ng-container matColumnDef="action">

                    <th mat-header-cell *matHeaderCellDef>
                        Action
                    </th>

                    <td mat-cell *matCellDef="let r">

                        <span class="badge" [class.warn]="actionClass(r.action)==='warn'"
                            [class.danger]="actionClass(r.action)==='danger'">

                            {{r.action}}

                        </span>

                    </td>

                </ng-container>


                <ng-container matColumnDef="reason">

                    <th mat-header-cell *matHeaderCellDef>
                        Reason
                    </th>

                    <td mat-cell *matCellDef="let r">
                        {{r.reason}}
                    </td>

                </ng-container>


                <ng-container matColumnDef="performedBy">

                    <th mat-header-cell *matHeaderCellDef>
                        Performed By
                    </th>

                    <td mat-cell *matCellDef="let r">
                        {{r.performedBy}}
                    </td>

                </ng-container>


                <tr mat-header-row *matHeaderRowDef="
displayedColumns
">
                </tr>

                <tr mat-row *matRowDef="
let row;
columns:
displayedColumns
">
                </tr>

            </table>

        </div>

        <div class="shared-paginator">

            <mat-paginator [length]="total" [pageSize]="size" [pageSizeOptions]="[20,50]" (page)="changePage($event)">
            </mat-paginator>

        </div>

    </div>

</app-page-shell>
