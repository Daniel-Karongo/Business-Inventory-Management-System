<div class="tenant-page">

  <div class="header">

    <div class="title">
      <h1>Tenants</h1>
      <p>Manage SaaS tenants across the platform</p>
    </div>

    <button mat-flat-button color="primary" (click)="createTenant()">
      Create Tenant
    </button>

  </div>

  <!-- SEARCH -->

  <mat-form-field class="search">

    <mat-label>Search tenants</mat-label>

    <input
      matInput
      (input)="searchChanged($any($event.target).value)"
      placeholder="Tenant name or code">

  </mat-form-field>

  <!-- TABLE -->

  <div class="table-wrapper">

    <table mat-table [dataSource]="tenants">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let t">{{ t.name }}</td>
      </ng-container>

      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let t">{{ t.code }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let t">
          <span class="status" [ngClass]="t.status.toLowerCase()">
            {{ t.status }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let t">
          {{ t.createdAt | date:'medium' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">

        <th mat-header-cell *matHeaderCellDef></th>

        <td mat-cell *matCellDef="let t">

          <button
            mat-button
            color="primary"
            [routerLink]="['/platform/tenants', t.id]">

            Open

          </button>

          <button
            mat-button
            color="primary"
            (click)="subscription(t.id)">

            Subscription

          </button>

          <button
            mat-button
            color="warn"
            *ngIf="t.status === 'ACTIVE'"
            (click)="suspend(t.id)">

            Suspend

          </button>

          <button
            mat-button
            color="primary"
            *ngIf="t.status === 'SUSPENDED'"
            (click)="activate(t.id)">

            Activate

          </button>

        </td>

      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <!-- PAGINATOR -->

    <mat-paginator
      [length]="total"
      [pageSize]="size"
      [pageSizeOptions]="[10,20,50]"
      (page)="changePage($event)">

    </mat-paginator>

  </div>

</div>
