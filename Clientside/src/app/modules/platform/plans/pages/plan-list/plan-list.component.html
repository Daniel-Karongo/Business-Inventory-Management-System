<div class="plan-page">

  <div class="header">

    <div class="title">

      <h1>Plans</h1>

      <p>Manage SaaS subscription plans</p>

    </div>

    <button mat-flat-button color="primary" (click)="createPlan()">
      Create Plan
    </button>

  </div>

  <div class="table-wrapper">

    <table mat-table [dataSource]="plans">

      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let p">{{ p.code }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let p">{{ p.name }}</td>
      </ng-container>

      <ng-container matColumnDef="maxUsers">
        <th mat-header-cell *matHeaderCellDef>Users</th>
        <td mat-cell *matCellDef="let p">{{ p.maxUsers }}</td>
      </ng-container>

      <ng-container matColumnDef="maxBranches">
        <th mat-header-cell *matHeaderCellDef>Branches</th>
        <td mat-cell *matCellDef="let p">{{ p.maxBranches }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">

        <th mat-header-cell *matHeaderCellDef></th>

        <td mat-cell *matCellDef="let p">

          <button mat-button color="warn" (click)="delete(p.id)">
            Delete
          </button>

        </td>

      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

  </div>

</div>
